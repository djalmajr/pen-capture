name: Release extension and CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Validate release version
        shell: bash
        run: |
          release_version="${GITHUB_REF_NAME#v}"
          package_version="$(bun -p 'require("./package.json").version')"
          manifest_version="$(bun -p 'require("./extension/manifest.json").version')"

          if [[ "$release_version" != "$package_version" || "$release_version" != "$manifest_version" ]]; then
            echo "Tag ($release_version), package ($package_version), and manifest ($manifest_version) must match."
            exit 1
          fi

      - name: Test and build
        run: bun run verify

      - name: Publish CLI to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/pen-capture.npmrc
        shell: bash
        run: |
          printf '%s\n' \
            '@djalmajr:registry=https://npm.pkg.github.com' \
            '//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}' \
            'always-auth=true' > "$NPM_CONFIG_USERCONFIG"
          npm publish --access public --registry https://npm.pkg.github.com

      - name: Package extension
        shell: bash
        run: |
          mkdir -p release
          cd dist/extension
          zip -r "../../release/pen-capture-extension-${GITHUB_REF_NAME}.zip" .

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          "release/pen-capture-extension-${GITHUB_REF_NAME}.zip"
          --title "Pen Capture $GITHUB_REF_NAME"
          --generate-notes
